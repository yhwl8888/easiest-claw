<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 480px;
      -webkit-app-region: no-drag;
    }
    .icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 8px; color: #333; }
    p { font-size: 14px; color: #666; text-align: center; line-height: 1.6; margin-bottom: 24px; }
    .buttons { display: flex; gap: 12px; }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .primary {
      background: #1890ff;
      color: white;
    }
    .primary:hover { background: #40a9ff; }
    .secondary {
      background: #f0f0f0;
      color: #333;
    }
    .secondary:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📁</div>
    <h1>选择数据存储位置</h1>
    <p>OpenClaw 运行时数据约 500MB，建议选择空间充足的磁盘</p>
    <div class="buttons">
      <button class="secondary" onclick="window.electronAPI.useDefault()">使用默认</button>
      <button class="primary" onclick="window.electronAPI.chooseDir()">选择目录</button>
    </div>
  </div>
</body>
</html>
