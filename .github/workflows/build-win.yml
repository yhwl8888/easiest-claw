name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle Windows Node.js
        shell: powershell
        run: |
          $NODE_VER = "22.12.0"
          $arch = "win-x64"
          $url = "https://nodejs.org/dist/v$NODE_VER/node-v$NODE_VER-$arch.zip"
          Invoke-WebRequest -Uri $url -OutFile node-win.zip
          Expand-Archive -Path node-win.zip -DestinationPath . -Force
          New-Item -ItemType Directory -Force -Path resources/node | Out-Null
          Copy-Item "node-v$NODE_VER-$arch/node.exe" "resources/node/node.exe"
          Remove-Item -Recurse -Force "node-v$NODE_VER-$arch", node-win.zip

      - name: Bundle OpenClaw
        run: node scripts/bundle-openclaw.mjs
        env:
          npm_config_registry: https://registry.npmjs.org

      - name: Build (electron-vite)
        run: pnpm run build

      - name: Package NSIS installer
        run: pnpm exec electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasiestClaw-win-x64
          path: dist/*.exe
          if-no-files-found: error

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
