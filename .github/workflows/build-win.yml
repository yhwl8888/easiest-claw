name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "✓ package.json version → $VERSION"

      - name: Bundle Windows Node.js
        shell: powershell
        run: |
          $NODE_VER = "22.12.0"
          $arch = "win-x64"
          $url = "https://nodejs.org/dist/v$NODE_VER/node-v$NODE_VER-$arch.zip"
          Invoke-WebRequest -Uri $url -OutFile node-win.zip
          Expand-Archive -Path node-win.zip -DestinationPath . -Force
          New-Item -ItemType Directory -Force -Path resources/node | Out-Null
          Copy-Item "node-v$NODE_VER-$arch/node.exe" "resources/node/node.exe"
          Remove-Item -Recurse -Force "node-v$NODE_VER-$arch", node-win.zip

      - name: Bundle OpenClaw
        run: node scripts/bundle-openclaw.mjs
        env:
          npm_config_registry: https://registry.npmjs.org

      - name: Build (electron-vite)
        run: pnpm run build

      - name: Package NSIS installer
        run: pnpm exec electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: EasiestClaw-win-x64
          path: dist/*.exe
          if-no-files-found: error

      - name: Extract release notes & detect pre-release
        if: startsWith(github.ref, 'refs/tags/')
        id: release_meta
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          node scripts/extract-release-notes.mjs $VERSION > /tmp/release-notes.md
          cat /tmp/release-notes.md
          # 主版本号为 0 或包含 - 的版本视为测试版
          if [[ "$VERSION" =~ ^0\. ]] || [[ "$VERSION" =~ - ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
